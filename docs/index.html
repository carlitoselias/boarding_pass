
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación Fiesta – Santiago a Concón</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;400&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
    }
    body {
      min-height: 100vh;
      background: url('fondo_concon_vertical.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', Arial, sans-serif;
      color: #222;
      padding: 0;
      margin: 0;
    }
    .boarding-pass {
      background: rgba(255,255,255,0.65);
      border-radius: 22px;
      box-shadow: 0 8px 40px rgba(44,26,14,0.18);
      max-width: 420px;
      width: 100%;
      margin: 2rem;
      overflow: hidden;
      border: 2.5px solid #e8d9c5;
      font-family: 'Montserrat', Arial, sans-serif;
    }
    .bp-header {
      background: linear-gradient(90deg, #f9b15c 60%, #f7e7c7 100%);
      padding: 1.5rem 2rem 1.2rem 2rem;
      border-bottom: 2px dashed #e8d9c5;
      position: relative;
    }
    .bp-header h1 {
      font-size: 1.35rem;
      font-family: 'Roboto Mono', monospace;
      letter-spacing: 2px;
      margin: 0 0 0.2rem 0;
      color: #2c1a0e;
      font-weight: 700;
    }
    .bp-header .bp-route {
      font-size: 1.1rem;
      font-weight: 700;
      color: #4a2510;
      letter-spacing: 1.5px;
      margin-bottom: 0.2rem;
    }
    .bp-header .bp-barcode {
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      width: 90px;
      height: 32px;
      background: url('https://api.qrserver.com/v1/create-qr-code/?size=90x32&data=SCL-CONCON-2024') center/contain no-repeat;
      opacity: 0.7;
    }
    .bp-section {
      padding: 1.3rem 2rem 1.1rem 2rem;
      border-bottom: 1.5px solid #e8d9c5;
    }
    .bp-section:last-child {
      border-bottom: none;
    }
    .bp-label {
      font-size: 0.82rem;
      font-family: 'Roboto Mono', monospace;
      color: #b08a5c;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
      font-weight: 700;
      display: block;
    }
    .bp-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 0.3rem;
    }
    .bp-row strong {
      font-size: 1.1rem;
      color: #2c1a0e;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .bp-row span {
      font-size: 1rem;
      color: #4a2510;
      font-weight: 400;
    }
    .bp-details {
      margin-bottom: 0.7rem;
    }
    .bp-details .bp-row {
      margin-bottom: 0.15rem;
    }
    .bp-seat {
      background: #f7e7c7;
      color: #7a4a2a;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.98rem;
      padding: 0.18rem 0.7rem;
      border-radius: 8px;
      font-weight: 700;
      display: inline-block;
      margin-left: 0.5rem;
    }
    .bp-address {
      font-size: 0.98rem;
      color: #7a4a2a;
      margin-bottom: 0.2rem;
      margin-top: 0.2rem;
    }
    .bp-flight {
      font-size: 0.98rem;
      color: #b08a5c;
      font-family: 'Roboto Mono', monospace;
      margin-bottom: 0.2rem;
    }
    .bp-notes {
      background: rgba(247, 231, 199, 0.75);
      padding: 1.1rem 2rem 1.1rem 2rem;
      border-bottom-left-radius: 22px;
      border-bottom-right-radius: 22px;
    }
    .bp-notes .bp-label {
      color: #7a4a2a;
      margin-bottom: 0.7rem;
    }
    .bp-note-row {
      font-size: 1.01rem;
      color: #4a2510;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
    }
    .bp-note-row strong {
      min-width: 120px;
      font-weight: 700;
      color: #2c1a0e;
      font-size: 1.01rem;
    }
    .bp-note-row span {
      font-size: 1.01rem;
      color: #4a2510;
    }
    .bp-footer {
      text-align: center;
      font-size: 0.85rem;
      color: #4a2510;
      margin-top: 1.2rem;
      margin-bottom: 0.5rem;
      font-family: 'Roboto Mono', monospace;
    }
    @media (max-width: 600px) {
      .boarding-pass {
        max-width: 98vw;
        margin: 0.5rem;
        padding: 0;
      }
      .bp-header, .bp-section, .bp-notes {
        padding-left: 1rem;
        padding-right: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="boarding-pass">
    <div class="bp-header">
      <h1>FlyAway Airlines</h1>
      <div class="bp-route">Tarjeta de embarque</div>
      <div class="bp-barcode"></div>
    </div>
    <div class="bp-section" style="padding-bottom:1.5rem;">
      <div style="display:flex;align-items:center;justify-content:center;gap:1.1rem;font-size:1.35rem;font-weight:700;color:#4a2510;letter-spacing:2px;">
        <span style="font-family:'Roboto Mono',monospace;">SCL</span>
        <span style="font-size:1.5rem;">✈️</span>
        <span style="font-family:'Roboto Mono',monospace;">CONCÓN</span>
      </div>
    </div>
    <div class="bp-section">
      <span class="bp-label" style="color:#4a2510;"></span>
      <div class="bp-details">
        <div class="bp-row" style="justify-content:flex-start;margin-bottom:1rem;">
          <span>Fecha:</span>
        </div>
        <div style="font-size:1rem;font-weight:700;color:#4a2510;margin-bottom:1rem;">
          Viernes, 17 de abril
        </div>
        <div class="bp-row" style="justify-content:flex-start;margin-bottom:1rem;">
          <span>Hora:</span>
        </div>
        <div style="font-size:1rem;font-weight:700;color:#4a2510;margin-bottom:1rem;">
          Desde las 20:00 hrs
        </div>
        <div class="bp-row" style="justify-content:flex-start;margin-bottom:1rem;">
          <span>Puerta de embarque:</span>
        </div>
        <div class="bp-address" style="font-weight:700;color:#4a2510;margin-bottom:1rem;">El Dante 4241, Dpto 302, Las Condes</div>
      </div>
    </div>
    <div class="bp-notes">
      <span class="bp-label" style="color:#4a2510;">Lista de artículos permitidos</span>
      <div style="font-size:2.1rem;text-align:center;letter-spacing:0.2em;">
        🍺🥂🎵🍁🍷🍾
      </div>
    </div>
    <div class="bp-footer">
      Favor confirmar asistencia
    </div>
  </div>
</body>
</html>
